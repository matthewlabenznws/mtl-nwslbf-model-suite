
<!DOCTYPE html>
<html>
<head>
  <title>NWS LBF Model Viewer</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .topbar {
      background: linear-gradient(#2a2a2a, #151515);
      border-bottom: 1px solid #444;
      padding: 10px 14px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .main-title {
      font-size: 18px;
      font-weight: bold;
      text-align: left;
    }

    .meta {
      font-size: 13px;
      color: #bbb;
      text-align: right;
    }

    .controls {
      background: #1b1b1b;
      border-bottom: 1px solid #444;
      padding: 8px 12px;
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover, select:hover {
      background: #3a3a3a;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #2b7cff;
    }

    .tiles {
      background: #0f0f0f;
      border-bottom: 1px solid #444;
      padding: 7px 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
    }

    .tiles button {
      font-size: 12px;
      min-width: 44px;
      padding: 5px 8px;
    }

    .tiles button.active,
    .tiles button.available {
      background: #2b7cff;
      color: white;
      border-color: #9ec0ff;
    }

    .tiles button.missing {
      background: #111;
      color: #aaa;
      border-color: #555;
    }

    .image-wrap {
      padding: 10px 0 18px 0;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 190px);
      border: 1px solid #333;
      background: #000;
    }

    .hint {
      color: #aaa;
      font-size: 12px;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="title-row">
      <div>
        <div class="main-title">HRRR / RRFS | NWS LBF Model Viewer</div>
      </div>

      <div class="meta">
        Model:
        <select id="modelSelect" onchange="changeModel()"></select>

        &nbsp;&nbsp;

        Run:
        <select id="runSelect" onchange="changeRun()"></select>

        &nbsp;&nbsp;

        Product:
        <select id="productSelect" onchange="changeProduct()"></select>

        &nbsp;&nbsp;

        Domain:
        <select id="domainSelect" onchange="changeDomain()"></select>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="togglePlay()" id="playBtn">▶ Play</button>
    <button onclick="latestRun()">Latest</button>
    <input id="slider" type="range" min="0" max="60" value="0">
    <div id="fhrLabel">000</div>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="image-wrap">
    <img id="plot" src="" alt="NWS LBF model plot">
  </div>

  <div class="hint">Use ←/→ arrow keys or forecast-hour buttons to step through frames.</div>

<script>
const runsByModelProduct = {
  "hrrr": {
    "refl_uh": [
      "20260511_11z",
      "20260511_10z",
      "20260511_08z",
      "20260511_05z"
    ],
    "hail_swath": [
      "20260511_05z",
      "20260511_04z",
      "20260511_03z",
      "20260511_01z"
    ]
  },
  "rrfs": {
    "refl_uh": [
      "20260511_09z",
      "20260511_06z",
      "20260511_03z",
      "20260511_00z"
    ],
    "hail_swath": [
      "20260511_05z",
      "20260511_03z",
      "20260510_20z",
      "20260510_19z"
    ]
  }
};

const models = {
  "hrrr": "HRRR",
  "rrfs": "RRFS"
};

const domains = {
  "regional": "Default",
  "lbf": "LBF",
  "central_plains": "Central Plains",
  "spc_severe": "SPC Severe Risk"
};

const products = {
  "refl_uh": "Reflectivity / UH",
  "hail_swath": "Surface Hail Swath"
};

let selectedModel = "hrrr";
let selectedProduct = "refl_uh";
let selectedDomain = "regional";
let selectedRun = "";
let current = 0;
let playing = false;
let timer = null;

const plot = document.getElementById("plot");
const slider = document.getElementById("slider");
const tiles = document.getElementById("tiles");
const fhrLabel = document.getElementById("fhrLabel");
const playBtn = document.getElementById("playBtn");
const modelSelect = document.getElementById("modelSelect");
const runSelect = document.getElementById("runSelect");
const productSelect = document.getElementById("productSelect");
const domainSelect = document.getElementById("domainSelect");

function fhrName(fhr) {
  return String(fhr).padStart(3, "0");
}

function getRuns() {
  return runsByModelProduct[selectedModel]?.[selectedProduct] || [];
}

function getMaxFhrForRun(model, run) {
  if (!run) return 18;

  const hourPart = run.split("_")[1];
  const hour = Number(hourPart.replace("z", ""));

  if (model === "hrrr") {
    if ([0, 6, 12, 18].includes(hour)) return 48;
    return 18;
  }

  if (model === "rrfs") {
    if ([0, 6, 12, 18].includes(hour)) return 60;
    return 18;
  }

  return 18;
}

let maxFhr = 18;

function imgSrc(run, fhr) {
  let filename = "";

  if (!run) return "";

  if (selectedModel === "hrrr" && selectedProduct === "refl_uh") {
    filename = "hrrr_lbf_f" + fhrName(fhr) + ".png";
  } else if (selectedModel === "hrrr" && selectedProduct === "hail_swath") {
    filename = "hrrr_hail_f" + fhrName(fhr) + ".png";
  } else if (selectedModel === "rrfs" && selectedProduct === "refl_uh") {
    filename = "rrfs_lbf_f" + fhrName(fhr) + ".png";
  } else if (selectedModel === "rrfs" && selectedProduct === "hail_swath") {
    filename = "rrfs_hail_f" + fhrName(fhr) + ".png";
  } else {
    return "";
  }

  return "runs/" +
    selectedModel + "/" +
    selectedProduct + "/" +
    run + "/" +
    selectedDomain + "/" +
    filename +
    "?t=" + Date.now();
}

function prettyRun(run) {
  if (!run) return "No runs yet";

  const parts = run.split("_");
  const ymd = parts[0];
  const hour = parts[1].replace("z", "");

  return (
    ymd.slice(0, 4) + "-" +
    ymd.slice(4, 6) + "-" +
    ymd.slice(6, 8) + " " +
    hour + "z"
  );
}

function populateRunDropdown() {
  runSelect.innerHTML = "";

  const runs = getRuns();

  runs.forEach(function(run) {
    const option = document.createElement("option");
    option.value = run;
    option.text = prettyRun(run);
    runSelect.appendChild(option);
  });

  selectedRun = runs[0] || "";
  runSelect.value = selectedRun;
}

function buildHourButtons() {
  tiles.innerHTML = "";

  maxFhr = getMaxFhrForRun(selectedModel, selectedRun);
  slider.max = maxFhr;

  if (current > maxFhr) current = maxFhr;

  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.createElement("button");
    btn.className = "frame missing";
    btn.innerText = fhrName(i);
    btn.id = "btn" + i;
    btn.onclick = function() {
      setFrame(i);
    };
    tiles.appendChild(btn);
  }
}

function setFrame(fhr) {
  current = Math.max(0, Math.min(maxFhr, Number(fhr)));
  slider.value = current;
  fhrLabel.innerHTML = fhrName(current);

  const src = imgSrc(selectedRun, current);
  if (src) plot.src = src;

  document.querySelectorAll("button.frame").forEach(function(btn) {
    btn.classList.remove("active");
  });

  const active = document.getElementById("btn" + current);
  if (active) active.classList.add("active");

  preloadNeighbors(current);
}

function preloadNeighbors(fhr) {
  [fhr + 1, fhr + 2, fhr - 1].forEach(function(n) {
    if (n >= 0 && n <= maxFhr) {
      const src = imgSrc(selectedRun, n);
      if (src) {
        const img = new Image();
        img.src = src;
      }
    }
  });
}

function refreshHourAvailability() {
  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.getElementById("btn" + i);
    if (!btn) continue;

    btn.classList.remove("available", "missing");
    btn.classList.add("missing");

    const src = imgSrc(selectedRun, i);
    if (!src) continue;

    const testImg = new Image();

    testImg.onload = function() {
      btn.classList.remove("missing");
      btn.classList.add("available");
    };

    testImg.onerror = function() {
      btn.classList.remove("available");
      btn.classList.add("missing");
    };

    testImg.src = src;
  }
}

function changeModel() {
  selectedModel = modelSelect.value;
  current = 0;
  populateRunDropdown();
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function changeProduct() {
  selectedProduct = productSelect.value;
  current = 0;
  populateRunDropdown();
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function changeRun() {
  selectedRun = runSelect.value;
  current = 0;
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function changeDomain() {
  selectedDomain = domainSelect.value;
  refreshHourAvailability();
  setFrame(current);
}

function latestRun() {
  const runs = getRuns();
  selectedRun = runs[0] || "";
  runSelect.value = selectedRun;
  current = 0;
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function togglePlay() {
  playing = !playing;

  if (playing) {
    playBtn.innerHTML = "⏸ Pause";
    timer = setInterval(function() {
      current = current >= maxFhr ? 0 : current + 1;
      setFrame(current);
    }, 650);
  } else {
    playBtn.innerHTML = "▶ Play";
    clearInterval(timer);
  }
}

Object.entries(models).forEach(function(entry) {
  const key = entry[0];
  const label = entry[1];
  const option = document.createElement("option");
  option.value = key;
  option.text = label;
  modelSelect.appendChild(option);
});

Object.entries(products).forEach(function(entry) {
  const key = entry[0];
  const label = entry[1];
  const option = document.createElement("option");
  option.value = key;
  option.text = label;
  productSelect.appendChild(option);
});

Object.entries(domains).forEach(function(entry) {
  const key = entry[0];
  const label = entry[1];
  const option = document.createElement("option");
  option.value = key;
  option.text = label;
  domainSelect.appendChild(option);
});

slider.oninput = function() {
  setFrame(slider.value);
};

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") {
    setFrame(current + 1);
  } else if (e.key === "ArrowLeft") {
    setFrame(current - 1);
  } else if (e.key === " ") {
    e.preventDefault();
    togglePlay();
  }
});

modelSelect.value = selectedModel;
productSelect.value = selectedProduct;
domainSelect.value = selectedDomain;

populateRunDropdown();
buildHourButtons();
refreshHourAvailability();
setFrame(0);
</script>
</body>
</html>
