
<!DOCTYPE html>
<html>
<head>
  <title>HRRR LBF Viewer</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .topbar {
      background: linear-gradient(#2a2a2a, #151515);
      border-bottom: 1px solid #444;
      padding: 10px 14px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .main-title {
      font-size: 18px;
      font-weight: bold;
      text-align: left;
    }

    .meta {
      font-size: 13px;
      color: #bbb;
      text-align: right;
    }

    .controls {
      background: #1b1b1b;
      border-bottom: 1px solid #444;
      padding: 8px 12px;
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    select, button {
      background: #2c2c2c;
      color: white;
      border: 1px solid #666;
      padding: 6px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover, select:hover {
      background: #3a3a3a;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #2b7cff;
    }

    .tiles {
      background: #0f0f0f;
      border-bottom: 1px solid #444;
      padding: 7px 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
    }

    .tiles button {
      font-size: 12px;
      min-width: 44px;
      padding: 5px 8px;
    }

    .tiles button.active {
      background: #2b7cff;
      border-color: #9ec0ff;
    }

    .image-wrap {
      padding: 10px 0 18px 0;
    }

    #plot {
      max-width: 98vw;
      max-height: calc(100vh - 190px);
      border: 1px solid #333;
      background: #000;
    }

    .hint {
      color: #aaa;
      font-size: 12px;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="title-row">
      <div>
        <div class="main-title">HRRR | LBF Reflectivity / UH / Sim IR / θ Cold Pools / 4–6 km SR Winds</div>
        <div class="meta" id="validText">Forecast Hour: F000</div>
      </div>
      <div class="meta">
  Run:
  <select id="runSelect" onchange="changeRun()"></select>

  &nbsp;&nbsp;

  Domain:
  <select id="domainSelect" onchange="changeDomain()"></select>
</div>
      </div>
    </div>
  <div class="controls">
    <button onclick="togglePlay()" id="playBtn">▶ Play</button>
    <button onclick="latestRun()">Latest</button>
    <input id="slider" type="range" min="0" max="48" value="0">
    <div id="fhrLabel">F000</div>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="image-wrap">
    <img id="plot" src="" alt="HRRR LBF plot">
  </div>

  <div class="hint">Use ←/→ arrow keys or forecast-hour buttons to step through frames.</div>

<script>

// Add archived runs here.
// Newest run should be first.
const runs = [
  "20260507_08z",
  "20260507_07z",
  "20260507_06z",
  "20260507_05z",
  "20260507_04z",
  "20260507_03z"
];
const domains = {
  "regional": "Default",
  "lbf": "LBF",
  "central_plains": "Central Plains"
};

let selectedDomain = "regional";
const domainSelect = document.getElementById("domainSelect");
let selectedRun = runs[0];
function getMaxFhrForRun(run) {
  if (!run) return 18;

  const hourPart = run.split("_")[1];  // example: "18z"
  const hour = Number(hourPart.replace("z", ""));

  if ([0, 6, 12, 18].includes(hour)) {
    return 48;
  }

  return 18;
}

let maxFhr = getMaxFhrForRun(selectedRun);
let current = 0;
let playing = false;
let timer = null;

const plot = document.getElementById("plot");
const slider = document.getElementById("slider");
const tiles = document.getElementById("tiles");
const validText = document.getElementById("validText");
const fhrLabel = document.getElementById("fhrLabel");
const playBtn = document.getElementById("playBtn");
const runSelect = document.getElementById("runSelect");

function fhrName(fhr) {
  return String(fhr).padStart(3, "0");
}

function imgSrc(run, fhr) {
  return `runs/${run}/${selectedDomain}/hrrr_lbf_f${fhrName(fhr)}.png?t=${Date.now()}`;
}

function setFrame(fhr) {
  current = Math.max(0, Math.min(maxFhr, Number(fhr)));
  slider.value = current;

  const fhrString = `F${fhrName(current)}`;
  plot.src = imgSrc(selectedRun, current);

  validText.innerHTML = `Run: ${prettyRun(selectedRun)} | Forecast Hour: ${fhrString}`;
  fhrLabel.innerHTML = fhrString;

  document.querySelectorAll("button.frame").forEach(btn => btn.classList.remove("active"));
  const active = document.getElementById(`btn${current}`);
  if (active) active.classList.add("active");

  preloadNeighbors(current);
}

function preloadNeighbors(fhr) {
  [fhr + 1, fhr + 2, fhr - 1].forEach(n => {
    if (n >= 0 && n <= maxFhr) {
      const img = new Image();
      img.src = imgSrc(selectedRun, n);
    }
  });
}

function changeRun() {
  selectedRun = runSelect.value;
  current = 0;
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function latestRun() {
  selectedRun = runs[0];
  runSelect.value = selectedRun;
  current = 0;
  buildHourButtons();
  refreshHourAvailability();
  setFrame(0);
}

function togglePlay() {
  playing = !playing;

  if (playing) {
    playBtn.innerHTML = "⏸ Pause";
    timer = setInterval(() => {
      current = current >= maxFhr ? 0 : current + 1;
      setFrame(current);
    }, 650);
  } else {
    playBtn.innerHTML = "▶ Play";
    clearInterval(timer);
  }
}

function buildHourButtons() {
  tiles.innerHTML = "";

  maxFhr = getMaxFhrForRun(selectedRun);
  slider.max = maxFhr;

  if (current > maxFhr) {
    current = maxFhr;
  }

  for (let i = 0; i <= maxFhr; i++) {
    const btn = document.createElement("button");
    btn.className = "frame";
    btn.innerText = fhrName(i);
    btn.id = `btn${i}`;
    btn.onclick = () => setFrame(i);
    tiles.appendChild(btn);
  }
}

function prettyRun(run) {
  const parts = run.split("_");

  const ymd = parts[0];
  const hour = parts[1].replace("z", "");

  const year  = ymd.slice(0,4);
  const month = ymd.slice(4,6);
  const day   = ymd.slice(6,8);

  return `Tue ${year}-${month}-${day} ${hour}z`;
}

runs.forEach(run => {
  const option = document.createElement("option");

  option.value = run;
  option.text = prettyRun(run);

  runSelect.appendChild(option);
});

Object.entries(domains).forEach(([key, label]) => {
  const option = document.createElement("option");

  option.value = key;
  option.text = label;

  domainSelect.appendChild(option);
});
domainSelect.value = selectedDomain;

function changeDomain() {
  selectedDomain = domainSelect.value;
  setFrame(current);
}
function refreshHourAvailability() {
  for (let i = 0; i <= maxFhr; i++) {

    const btn = document.getElementById(`btn${i}`);

    if (!btn) continue;

    btn.classList.remove("available", "missing");
    btn.classList.add("missing");

    const testImg = new Image();

    testImg.onload = () => {
      btn.classList.remove("missing");
      btn.classList.add("available");
    };

    testImg.onerror = () => {
      btn.classList.remove("available");
      btn.classList.add("missing");
    };

    testImg.src = imgSrc(selectedRun, i);
  }
}

slider.oninput = () => setFrame(slider.value);

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowRight") {
    setFrame(current + 1);
  } else if (e.key === "ArrowLeft") {
    setFrame(current - 1);
  } else if (e.key === " ") {
    e.preventDefault();
    togglePlay();
  }
});

runSelect.value = selectedRun;
domainSelect.value = selectedDomain || "regional";
selectedDomain = domainSelect.value;
buildHourButtons();
refreshHourAvailability();
setFrame(0);
</script>
</body>
</html>
