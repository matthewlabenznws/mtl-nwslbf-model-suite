name: HRRR Hail Swath

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: old_site

      - name: Restore previous HRRR hail runs
        run: |
          mkdir -p site/runs/hrrr/hail_swath
          cp -r old_site/runs/hrrr/hail_swath/* site/runs/hrrr/hail_swath/ || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run HRRR Hail Swath
        run: |
          python hrrr_hail_swath.py
          python cleanup_site_runs.py hrrr hail_swath
          python write_product_runs_json.py hrrr hail_swath

      - uses: actions/upload-artifact@v4
        with:
          name: hrrr-hail-swath-output
          path: site/runs/hrrr/hail_swath

  deploy:
    runs-on: ubuntu-latest
    needs: build

    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hrrr-hail-swath-output
          path: product-output

      - name: Deploy HRRR hail to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          rm -rf gh-pages-work
          git worktree add gh-pages-work origin/gh-pages

          mkdir -p gh-pages-work/runs/hrrr
          rm -rf gh-pages-work/runs/hrrr/hail_swath
          cp -r product-output gh-pages-work/runs/hrrr/hail_swath

          cd gh-pages-work
          git add -A runs/hrrr/hail_swath
          git commit -m "Update HRRR hail swath" || echo "No changes to commit"
          git push origin HEAD:gh-pages
