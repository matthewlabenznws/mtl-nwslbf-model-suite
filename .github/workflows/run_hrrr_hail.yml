name: HRRR Hail Swath

on:
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: model-viewer-deploy
  cancel-in-progress: false
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore existing site from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: old_site

      - name: Restore previous runs
        run: |
          mkdir -p site
          cp -r old_site/* site/ || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run HRRR Hail Swath
        run: |
          python hrrr_hail_swath.py
          python cleanup_site_runs.py
          python build_index.py

      # ADD THIS SECTION HERE
      - name: Debug hail swath output
        run: |
          echo "Hail swath folders:"
          find site/runs/hrrr/hail_swath -maxdepth 3 -type d | sort

          echo "Hail swath files:"
          find site/runs/hrrr/hail_swath -type f | sort | tail -50

          echo "Index hail_swath check:"
          grep -n "hail_swath" site/index.html | head -20 || true

          echo "Index 23z check:"
          grep -n "20260510_23z" site/index.html || true

      - name: Deploy site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: false
