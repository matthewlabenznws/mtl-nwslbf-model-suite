name: RRFS Hail Swath

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore existing site from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: old_site

      - name: Restore previous RRFS hail runs
        run: |
         mkdir -p site/runs/rrfs/hail_swath
         cp -r old_site/runs/rrfs/hail_swath/* site/runs/rrfs/hail_swath/ || true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RRFS Hail Swath
        run: |
          python rrfs_hail_swath.py
          python cleanup_site_runs.py rrfs hail_swath
          python write_product_runs_json.py rrfs hail_swath

      - name: Deploy site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
