name: HRRR Reflectivity Viewer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: old_site

      - name: Restore previous HRRR reflectivity runs
        run: |
          mkdir -p site/runs/hrrr/refl_uh
          cp -r old_site/runs/hrrr/refl_uh/* site/runs/hrrr/refl_uh/ || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run HRRR Reflectivity/UH
        run: |
          python hrrr_lbf.py
          python cleanup_site_runs.py hrrr refl_uh
          python write_product_runs_json.py hrrr refl_uh

      - uses: actions/upload-artifact@v4
        with:
          name: hrrr-refl-uh-output
          path: site/runs/hrrr/refl_uh

  deploy:
    runs-on: ubuntu-latest
    needs: build

   concurrency:
      group: hrrr-refl-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hrrr-refl-uh-output
          path: product-output

      - name: Deploy HRRR reflectivity to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          rm -rf gh-pages-work
          git worktree add gh-pages-work origin/gh-pages

          mkdir -p gh-pages-work/runs/hrrr
          rm -rf gh-pages-work/runs/hrrr/refl_uh
          cp -r product-output gh-pages-work/runs/hrrr/refl_uh

          cd gh-pages-work
          git add -A runs/hrrr/refl_uh
          git commit -m "Update HRRR reflectivity" || echo "No changes to commit"
          git push origin HEAD:gh-pages
